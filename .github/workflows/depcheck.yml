name: DepCheck
on:
  pull_request:
    branches: [main]

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install "warpfix-nonexistent-package-xyz123==9.9.9"
